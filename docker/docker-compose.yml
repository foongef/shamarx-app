services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-bot-postgres
    restart: unless-stopped
    # wal_level=logical + slots/senders enable future zero-downtime migration
    # to RDS via AWS DMS or native logical replication. No runtime cost when
    # no replication clients are connected.
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-trading} -d $${POSTGRES_DB:-trading_bot}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trading-bot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  execution-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.execution
    container_name: trading-bot-execution
    restart: unless-stopped
    # Opt-in to autoheal — Docker `restart: unless-stopped` only reacts to
    # process exit, not healthcheck failure. The autoheal sidecar (below)
    # restarts any container labelled `autoheal=true` once Docker has marked
    # it unhealthy. Pair with the staleness-aware /health in main.py — the
    # whole feedback loop is: stuck event loop → no liveness updates →
    # /health 503 → Docker unhealthy → autoheal restarts → fresh process.
    labels:
      autoheal: 'true'
    ports:
      - '8000:8000'
    env_file:
      - ../.env
    environment:
      # Override .env's localhost-flavored DATABASE_URL with the docker-network
      # hostname so the DB-first historical_data path actually reaches postgres.
      # Without this, the service falls back to the synthetic CSV.
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading}@postgres:5432/${POSTGRES_DB:-trading_bot}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # `.raise_for_status()` is load-bearing — httpx.get returns the Response
      # regardless of status, so without it a /health 503 would silently pass.
      test:
        - CMD
        - python
        - -c
        - 'import httpx; r = httpx.get("http://localhost:8000/health"); r.raise_for_status()'
      interval: 10s
      timeout: 5s
      retries: 5
      # 60s grace so MetaApi WebSocket bootstrap doesn't trip the check.
      start_period: 60s

  trading-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nestjs
    container_name: trading-bot-app
    restart: unless-stopped
    ports:
      - '9000:9000'
    # Cap container memory at 2 GiB so a runaway replay (2-year × 4 pairs holds
    # ~300 MB of candles + indicators in heap) can never starve postgres / nginx
    # on the 3.7 GiB host. Pairs with NODE_OPTIONS so V8 GCs more aggressively
    # before the kernel SIGKILLs us.
    mem_limit: 2g
    memswap_limit: 2g
    env_file:
      - ../.env
    environment:
      PORT: '9000'
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=1536}
      # DATABASE_URL comes from .env (SSM-sourced in prod); fall back to a
      # docker-network-resolvable default for local dev.
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading}@postgres:5432/${POSTGRES_DB:-trading_bot}?schema=public}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      EXECUTION_SERVICE_URL: http://execution-service:8000
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.5}
      MAX_DAILY_LOSS_PERCENT: ${MAX_DAILY_LOSS_PERCENT:-3.0}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS:-3}
      MAX_CONSECUTIVE_LOSSES: ${MAX_CONSECUTIVE_LOSSES:-3}
      RISK_PER_TRADE_PERCENT: ${RISK_PER_TRADE_PERCENT:-1.0}
      MAX_SPREAD_POINTS: ${MAX_SPREAD_POINTS:-50}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      execution-service:
        condition: service_healthy

  # Watchdog sidecar — polls the Docker daemon every 30s for containers
  # labelled `autoheal=true` whose health status has been `unhealthy` for
  # `retries` consecutive checks, and restarts them. Plugs the gap left by
  # `restart: unless-stopped`, which only reacts to process exit. Mounts the
  # Docker socket — acceptable here because this is a single-tenant prod
  # box; do not deploy this image in environments where the autoheal
  # container itself could run untrusted code.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: trading-bot-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: '30'
      AUTOHEAL_START_PERIOD: '60'
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: '10'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Frontend container — only used for local dev. In prod the Next.js app is
  # served by AWS Amplify (built directly from the repo's apps/web/), not
  # from this container. Activate locally with:
  #   docker compose --profile local up
  web:
    profiles: ['local']
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: trading-bot-web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://trading-bot:9000
    depends_on:
      - trading-bot

volumes:
  postgres_data:
