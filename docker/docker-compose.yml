services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-bot-postgres
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_bot
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trading -d trading_bot']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trading-bot-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  execution-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.execution
    container_name: trading-bot-execution
    ports:
      - '8000:8000'
    env_file:
      - ../.env
    environment:
      # Override .env's localhost-flavored DATABASE_URL with the docker-network
      # hostname so the DB-first historical_data path actually reaches postgres.
      # Without this, the service falls back to the synthetic CSV.
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_bot?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', 'import httpx; httpx.get("http://localhost:8000/health")']
      interval: 10s
      timeout: 5s
      retries: 3

  trading-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nestjs
    container_name: trading-bot-app
    ports:
      - '9000:9000'
    environment:
      PORT: '9000'
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading_bot?schema=public
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      EXECUTION_SERVICE_URL: http://execution-service:8000
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.5}
      MAX_DAILY_LOSS_PERCENT: '3.0'
      MAX_OPEN_POSITIONS: '3'
      MAX_CONSECUTIVE_LOSSES: '3'
      RISK_PER_TRADE_PERCENT: '1.0'
      MAX_SPREAD_POINTS: '50'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      execution-service:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: trading-bot-web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://trading-bot:9000
    depends_on:
      - trading-bot

volumes:
  postgres_data:
